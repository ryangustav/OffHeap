name: "🐛 Bug Report"
description: Report a bug to help us improve OffHeap
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below as completely as possible to help us reproduce and fix the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the problem...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior. Please provide a minimal code snippet if possible.
      placeholder: |
        1. Go to '...'
        2. Call '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: Please provide your environment details (Node.js version, OS, OffHeap version).
      placeholder: |
        - Node.js version:
        - OS:
        - OffHeap version:
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, log outputs, screenshots, or code blocks that could help.
      placeholder: Extra information...
    validations:
      required: false
