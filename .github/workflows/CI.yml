name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Run Cargo Audit
        uses: actions-rust-lang/audit@v1
      - name: Run NPM Audit
        run: npm audit --omit=dev

  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            architecture: x64
            test: true
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            architecture: x64
            test: false
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            architecture: arm64
            test: false
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            architecture: arm64
            test: false
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64
            test: true
          - host: macos-latest
            target: x86_64-apple-darwin
            architecture: x64
            test: true
          - host: macos-latest
            target: aarch64-apple-darwin
            architecture: arm64
            test: true

    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install musl-tools
        if: matrix.settings.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Zig
        if: contains(matrix.settings.target, 'aarch64-unknown-linux')
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.11.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.settings.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.settings.target }}-node-${{ matrix.settings.architecture }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          if [[ "${{ matrix.settings.target }}" == *"aarch64-unknown-linux"* ]]; then
            npm run build -- --target ${{ matrix.settings.target }} --zig
          else
            npm run build -- --target ${{ matrix.settings.target }}
          fi
        shell: bash

      - name: Run tests
        if: matrix.settings.test == true
        run: npm test

      - name: Run tests in Docker (Alpine Musl)
        if: matrix.settings.target == 'x86_64-unknown-linux-musl'
        run: |
          docker run --rm -v "$PWD:/app" -w /app node:20-alpine sh -c "
            node -e \"const { CacheManager } = require('./index.js'); const m = new CacheManager(); const c = m.createCache('test', { capacity: 10 }); c.set('k', 'v'); console.log('Alpine Link OK:', c.get('k'));\"
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            *.node
            index.js
            index.d.ts
          if-no-files-found: error

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Copy artifacts
        run: |
          # Move artifacts to root
          cp artifacts/bindings-*/*.node . || true
          cp artifacts/bindings-*/index.js . || true
          cp artifacts/bindings-*/index.d.ts . || true

      - name: Prepublish
        run: npm run prepublishOnly

      - name: Publish to NPM
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
